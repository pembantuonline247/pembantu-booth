name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias boothkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pembantuan -keypass pembantuan \
            -dname "CN=PembantuBooth, OU=PembantuOnline, O=Pembantu, L=KL, ST=Kuala Lumpur, C=MY"

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign release APK with jarsigner
        run: |
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore release.keystore -storepass pembantuan -keypass pembantuan \
            app/build/outputs/apk/release/app-release-unsigned.apk boothkey
          
          jarsigner -verify app/build/outputs/apk/release/app-release-unsigned.apk
          echo "=== Signed ==="
          
          cp app/build/outputs/apk/release/app-release-unsigned.apk pembantu-booth-signed.apk

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: pembantu-booth-release-signed
          path: pembantu-booth-signed.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pembantu-booth-debug
          path: app/build/outputs/apk/debug/app-debug.apk

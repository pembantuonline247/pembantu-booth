<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pembantu Booth</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --success: #2ecc71;
    --warn: #f39c12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden; height: 100vh; width: 100vw;
  }
  #app {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 100vh;
    gap: 0;
  }
  #camera-col {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #video { width: 100%; height: 100%; object-fit: contain; }
  #ip-cam-feed { width: 100%; height: 100%; object-fit: contain; display: none; }
  #no-cam {
    color: var(--muted); font-size: 1.5rem;
    text-align: center; padding: 2rem;
  }
  #no-cam .icon { font-size: 4rem; margin-bottom: 1rem; }

  #panel {
    background: var(--surface); overflow-y: auto;
    display: flex; flex-direction: column;
    border-left: 2px solid rgba(233,69,96,.3);
  }
  #panel header {
    padding: 1rem; background: rgba(0,0,0,.3);
    text-align: center; border-bottom: 1px solid rgba(255,255,255,.1);
  }
  #panel header h1 { font-size: 1.1rem; color: var(--accent); }
  #panel header .sub { font-size: .75rem; color: var(--muted); margin-top: .25rem; }

  .section {
    padding: .75rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .section h2 {
    font-size: .8rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: .5rem;
  }

  .device-list { list-style: none; }
  .device-list li {
    display: flex; align-items: center; gap: .5rem;
    padding: .4rem .5rem; margin-bottom: .25rem;
    background: rgba(255,255,255,.05); border-radius: 6px;
    font-size: .8rem; cursor: pointer;
    transition: background .2s;
  }
  .device-list li:hover { background: rgba(233,69,96,.15); }
  .device-list li.active { background: rgba(233,69,96,.25); border-left: 3px solid var(--accent); }
  .device-list .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
  }
  .device-list .dot.offline { background: var(--muted); }
  .device-list .type {
    font-size: .6rem; background: rgba(255,255,255,.1);
    padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
  }

  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .5rem 1rem; border: none; border-radius: 6px;
    font-size: .8rem; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-sm { padding: .3rem .6rem; font-size: .7rem; }

  .action-row { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem; }

  .color-grid {
    display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem;
  }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: border-color .2s;
  }
  .color-swatch:hover { border-color: #fff; }
  .color-swatch.active { border-color: var(--accent); }

  #ip-cam-section .cam-preview {
    width: 100%; height: 120px; object-fit: cover;
    border-radius: 6px; background: #000;
    margin-top: .5rem; display: none;
  }

  #status-bar {
    margin-top: auto;
    padding: .5rem 1rem;
    font-size: .7rem; color: var(--muted);
    background: rgba(0,0,0,.2);
    display: flex; justify-content: space-between;
  }
  #status-bar .connected { color: var(--success); }

  .log {
    max-height: 80px; overflow-y: auto;
    font-size: .65rem; color: var(--muted);
    padding: .4rem 1rem;
    background: rgba(0,0,0,.2);
    font-family: monospace;
  }
  .log div { padding: 1px 0; }
  .log .info { color: #5bc0de; }
  .log .err { color: var(--accent); }
  .log .ok { color: var(--success); }

  #flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #fff; opacity: 0; pointer-events: none;
    z-index: 999; transition: opacity .1s;
  }
  #flash.active { opacity: .7; }

  :focus { outline: none; }
  :focus-visible {
    outline: 3px solid #e94560 !important;
    outline-offset: 4px !important;
    box-shadow: 0 0 20px rgba(233,69,96,.5), 0 0 40px rgba(233,69,96,.2) !important;
    border-radius: 6px;
  }

  /* TV/remote focus ring on buttons */
  button:focus-visible,
  [tabindex]:focus-visible,
  .btn:focus-visible,
  .filter-chip:focus-visible,
  .color-swatch:focus-visible,
  .gallery-thumb:focus-visible,
  .device-list li:focus-visible,
  .source-tab:focus-visible {
    outline: 3px solid #e94560 !important;
    outline-offset: 3px !important;
    box-shadow: 0 0 16px rgba(233,69,96,.6);
    transform: scale(1.05);
  }

  /* TV focus ring — manually applied by JS focus manager for reliable D-pad */
  .tv-focused {
    outline: 4px solid #e94560 !important;
    outline-offset: 5px !important;
    box-shadow: 0 0 24px rgba(233,69,96,.8), 0 0 48px rgba(233,69,96,.3) !important;
    border-radius: 8px;
    transform: scale(1.08);
    transition: all .1s ease-out;
    position: relative;
    z-index: 10;
  }

  /* ── Countdown overlay ── */
  #countdown-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,.6); z-index: 50;
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-size: 12rem; font-weight: 900; color: #fff;
    text-shadow: 0 0 40px rgba(233,69,96,.5);
    animation: countPulse .8s ease-out;
  }
  @keyframes countPulse {
    0% { transform: scale(1.6); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1); opacity: 0; }
  }

  /* ── Gallery strip ── */
  #gallery-strip {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px; background: rgba(0,0,0,.7);
    display: flex; align-items: center; gap: 6px;
    padding: 0 10px; overflow-x: auto; z-index: 40;
    backdrop-filter: blur(4px);
  }
  #gallery-strip.hidden { display: none; }
  .gallery-thumb {
    height: 64px; width: auto; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color .2s, transform .15s;
    flex-shrink: 0;
  }
  .gallery-thumb:hover { border-color: var(--accent); transform: scale(1.05); }
  .gallery-thumb.video-thumb { position: relative; }
  .gallery-thumb.video-thumb::after {
    content: '▶'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: #fff; font-size: 1.2rem;
    text-shadow: 0 0 8px rgba(0,0,0,.8);
  }

  /* ── Gallery modal ── */
  #gallery-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.92); z-index: 100;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; padding: 2rem;
  }
  #gallery-modal.show { display: flex; }
  #gallery-modal img, #gallery-modal video {
    max-width: 90vw; max-height: 75vh;
    border-radius: 8px; object-fit: contain;
  }
  #gallery-modal .modal-actions {
    margin-top: 1rem; display: flex; gap: .8rem;
  }
  #gallery-modal .btn-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: #fff;
    font-size: 2rem; cursor: pointer; opacity: .7;
  }
  #gallery-modal .btn-close:hover { opacity: 1; }

  /* ── Recording indicator ── */
  #rec-indicator {
    position: absolute; top: 16px; right: 16px;
    display: none; align-items: center; gap: 8px;
    background: rgba(0,0,0,.7); padding: 8px 14px;
    border-radius: 20px; z-index: 45; font-size: .85rem;
  }
  #rec-indicator.show { display: flex; }
  #rec-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #e94560; animation: recBlink 1s infinite;
  }
  @keyframes recBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }
  #rec-time { font-weight: 600; letter-spacing: 1px; }

  /* ── Recording button ── */
  #rec-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid #e94560; background: transparent;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all .2s;
    flex-shrink: 0;
  }
  #rec-btn .inner {
    width: 20px; height: 20px; border-radius: 50%;
    background: #e94560; transition: all .3s;
  }
  #rec-btn.recording .inner {
    width: 14px; height: 14px; border-radius: 3px;
  }
  #rec-btn.recording { border-color: #fff; }

  /* ── Filter overlay ── */
  .filter-normal { filter: none; }
  .filter-grayscale { filter: grayscale(1); }
  .filter-sepia { filter: sepia(.8); }
  .filter-vintage { filter: sepia(.5) contrast(1.2) brightness(.9); }
  .filter-cool { filter: hue-rotate(180deg) saturate(.6); }

  #filter-bar {
    display: none; gap: 4px; margin-top: .4rem;
  }
  #filter-bar.show { display: flex; }
  .filter-chip {
    padding: 3px 8px; border-radius: 10px;
    font-size: .65rem; background: rgba(255,255,255,.1);
    border: 1px solid transparent; cursor: pointer;
    color: var(--muted); transition: all .15s;
  }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Burst count badge ── */
  #burst-badge {
    position: absolute; top: 16px; left: 16px;
    background: var(--accent); color: #fff;
    padding: 6px 12px; border-radius: 6px;
    font-size: .8rem; font-weight: 600;
    display: none; z-index: 45;
  }
  #burst-badge.show { display: block; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--muted); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .source-tabs {
    display: flex; gap: .25rem; margin-bottom: .5rem;
  }
  .source-tab {
    padding: .3rem .7rem; border-radius: 4px 4px 0 0;
    font-size: .7rem; cursor: pointer; background: rgba(255,255,255,.05);
    border: none; color: var(--muted);
  }
  .source-tab.active { background: var(--accent); color: #fff; }

  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="camera-col">
    <video id="video" autoplay playsinline muted></video>
    <img id="ip-cam-feed" crossorigin="anonymous" />
    <div id="no-cam">
      <div class="icon">📷</div>
      <div id="cam-status">Waiting for camera...</div>
    </div>
    <div id="flash"></div>
    <!-- Countdown overlay -->
    <div id="countdown-overlay"><span id="countdown-num"></span></div>
    <!-- Recording indicator -->
    <div id="rec-indicator">
      <span id="rec-dot"></span>
      <span id="rec-time">00:00</span>
    </div>
    <!-- Burst badge -->
    <div id="burst-badge"></div>
    <!-- Gallery strip -->
    <div id="gallery-strip" class="hidden"></div>
  </div>

  <div id="panel">
    <header>
      <h1>✦ Pembantu Booth</h1>
      <div class="sub" id="device-label">Loading...</div>
    </header>

    <!-- Source selector -->
    <div class="section">
      <h2>📷 Source</h2>
      <div class="source-tabs">
        <button class="source-tab active" data-source="usb" onclick="switchSource('usb')" tabindex="0">USB Cam</button>
        <button class="source-tab" data-source="ipcam" onclick="switchSource('ipcam')" tabindex="0">IP Camera</button>
      </div>
      <div class="action-row">
        <button class="btn btn-primary btn-sm" onclick="capturePhoto()" tabindex="0">Capture</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="countdownAndCapture()" tabindex="0">⏱ Timer</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="burstMode()" tabindex="0">🔥 Burst</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="toggleFilterBar()" tabindex="0">🎨 Filter</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="toggleMirror()" tabindex="0">↔ Flip</button>
      </div>
      <!-- Filter bar -->
      <div id="filter-bar">
        <span class="filter-chip active" data-filter="normal" onclick="setFilter('normal')" tabindex="0" role="button">Normal</span>
        <span class="filter-chip" data-filter="grayscale" onclick="setFilter('grayscale')" tabindex="0" role="button">B&amp;W</span>
        <span class="filter-chip" data-filter="sepia" onclick="setFilter('sepia')" tabindex="0" role="button">Sepia</span>
        <span class="filter-chip" data-filter="vintage" onclick="setFilter('vintage')" tabindex="0" role="button">Vintage</span>
        <span class="filter-chip" data-filter="cool" onclick="setFilter('cool')" tabindex="0" role="button">Cool</span>
      </div>
    </div>

    <!-- IP Cameras -->
    <div class="section" id="ip-cam-section">
      <h2>📡 IP Cameras <button class="btn btn-sm" style="background:rgba(255,255,255,.1);margin-left:.5rem" onclick="scanForCameras()" tabindex="0">Scan</button><span id="cam-scanning" style="display:none;margin-left:.3rem"><span class="spinner"></span></span></h2>
      <div id="ip-camera-list">
        <p style="font-size:.75rem;color:var(--muted)">Tap Scan to find cameras on WiFi</p>
      </div>
      <img id="ip-cam-preview" class="cam-preview" />
    </div>

    <!-- Devices -->
    <div class="section">
      <h2>📡 Devices <span id="scanning" style="display:none"><span class="spinner"></span></span></h2>
      <div id="device-section">
        <p style="font-size:.75rem;color:var(--muted)">Scanning WiFi for devices...</p>
      </div>
    </div>

    <!-- Lights -->
    <div class="section" id="lights-section" style="display:none">
      <h2>💡 Lights</h2>
      <div class="color-grid">
        <div class="color-swatch" style="background:#e94560" data-r="233" data-g="69" data-b="96" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#2ecc71" data-r="46" data-g="204" data-b="113" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#3498db" data-r="52" data-g="152" data-b="219" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#f1c40f" data-r="241" data-g="196" data-b="15" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#9b59b6" data-r="155" data-g="89" data-b="182" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#fff" data-r="255" data-g="255" data-b="255" onclick="setLight(this)" tabindex="0"></div>
        <div class="color-swatch" style="background:#000" data-r="0" data-g="0" data-b="0" onclick="setLight(this)" tabindex="0"></div>
      </div>
      <div class="action-row">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="strobe()" tabindex="0">Strobe</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="rainbow()" tabindex="0">Rainbow</button>
      </div>
    </div>

    <!-- Print -->
    <div class="section" id="print-section" style="display:none">
      <h2>🖨️ Print</h2>
      <button class="btn btn-primary btn-sm" onclick="printPhoto()" tabindex="0">Print Last Photo</button>
      <span id="print-status" style="font-size:.7rem;color:var(--muted);margin-left:.5rem"></span>
    </div>

    <!-- Video Recording -->
    <div class="section">
      <h2>🎥 Video</h2>
      <div style="display:flex;align-items:center;gap:.8rem">
        <button id="rec-btn" onclick="toggleRecording()" tabindex="0"><span class="inner"></span></button>
        <span style="font-size:.75rem;color:var(--muted)">Tap to start recording</span>
      </div>
      <div id="video-preview" style="display:none;margin-top:.5rem">
        <video id="recorded-video" controls style="width:100%;border-radius:6px;max-height:150px"></video>
        <div class="action-row">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="downloadVideo()">⬇ Download</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="clearVideo()">🗑 Clear</button>
        </div>
      </div>
    </div>

    <!-- Gallery -->
    <div class="section">
      <h2>🖼️ Gallery <span id="gallery-count" style="font-size:.7rem;color:var(--muted);font-weight:normal"></span></h2>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="clearGallery()" tabindex="0">🗑 Clear All</button>
    </div>

    <div id="status-bar">
      <span id="connection-status">Disconnected</span>
      <span id="ip-display"></span>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────
const state = {
  stream: null,
  devices: { printers: [], lights: [], cameras: [], others: [] },
  ipCameras: [],
  activeIpCamera: null,
  currentSource: 'usb', // 'usb' or 'ipcam'
  lastPhoto: null,
  mirror: false,
  bridge: null,
  connected: false,
  localIP: 'Unknown',
  streamingCallbacks: {},
};

// ──────────────────────────────────────────────────
// Native bridge detection
// ──────────────────────────────────────────────────
function hasBridge() {
  return typeof AndroidBooth !== 'undefined';
}

function initBridge() {
  if (!hasBridge()) {
    log('err', 'Native bridge not available (running outside app)');
    updateStatus('Browser mode — limited features');
    return;
  }
  state.bridge = AndroidBooth;
  state.connected = true;
  log('ok', 'Native bridge connected');

  try {
    const info = JSON.parse(state.bridge.getDeviceInfo());
    state.localIP = info.localIP;
    document.getElementById('ip-display').textContent = info.localIP;
    document.getElementById('device-label').textContent = `${info.manufacturer} ${info.model}`;
  } catch(e) {}

  updateStatus('Connected ✓');
  document.getElementById('connection-status').classList.add('connected');
  document.getElementById('connection-status').textContent = 'Connected ✓';

  // Start scanning for devices
  discoverDevices();
}

// ──────────────────────────────────────────────────
// Source switching (USB vs IP Camera)
// ──────────────────────────────────────────────────
function switchSource(source) {
  state.currentSource = source;
  document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.source-tab[data-source="${source}"]`).classList.add('active');

  const video = document.getElementById('video');
  const ipFeed = document.getElementById('ip-cam-feed');
  const noCam = document.getElementById('no-cam');

  if (source === 'usb') {
    // Stop IP camera stream
    stopIpCamera();
    ipFeed.style.display = 'none';
    if (state.stream) {
      video.style.display = 'block';
      noCam.style.display = 'none';
    } else {
      video.style.display = 'none';
      noCam.style.display = 'block';
      document.getElementById('cam-status').textContent = 'No USB camera detected';
    }
  } else {
    // Hide USB video
    video.style.display = 'none';
    if (state.activeIpCamera) {
      ipFeed.style.display = 'block';
      noCam.style.display = 'none';
    } else {
      ipFeed.style.display = 'none';
      noCam.style.display = 'block';
      document.getElementById('cam-status').textContent = 'Select an IP camera below';
    }
  }
}

// ──────────────────────────────────────────────────
// WebRTC USB Camera
// ──────────────────────────────────────────────────
async function startCamera() {
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
      audio: true,
    });
    const video = document.getElementById('video');
    video.srcObject = state.stream;
    await video.play();
    if (state.currentSource === 'usb') {
      document.getElementById('no-cam').style.display = 'none';
      video.style.display = 'block';
    }
    log('ok', 'USB camera started');
  } catch (e) {
    document.getElementById('cam-status').textContent = 'No USB camera: ' + e.message;
    log('info', 'USB camera not available - use IP camera');
  }
}

function capturePhoto() {
  // Use whichever source is active
  if (state.currentSource === 'ipcam' && state.activeIpCamera) {
    const img = document.getElementById('ip-cam-feed');
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth || 640;
    canvas.height = img.naturalHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    state.lastPhoto = canvas.toDataURL('image/jpeg', 0.85);
  } else {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    if (state.mirror) ctx.translate(canvas.width, 0), ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    state.lastPhoto = canvas.toDataURL('image/jpeg', 0.85);
  }

  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);
  log('ok', 'Photo captured');
}

function toggleMirror() {
  state.mirror = !state.mirror;
  document.getElementById('video').style.transform = state.mirror ? 'scaleX(-1)' : 'none';
}

// ──────────────────────────────────────────────────
// IP Camera Discovery
// ──────────────────────────────────────────────────
function scanForCameras() {
  if (!hasBridge()) { log('err', 'Bridge not available'); return; }

  const scanning = document.getElementById('cam-scanning');
  scanning.style.display = 'inline-block';
  state.ipCameras = [];

  document.getElementById('ip-camera-list').innerHTML = '<p style="font-size:.75rem;color:var(--muted)">Scanning network...</p>';

  try {
    AndroidBooth.scanIPCameras('ipcam-scan');
  } catch(e) {
    log('err', 'Camera scan error: ' + e.message);
    scanning.style.display = 'none';
  }
}

function selectIpCamera(cam) {
  // Deselect previous
  document.querySelectorAll('#ip-camera-list li').forEach(li => li.classList.remove('active'));
  // Select this one
  const li = document.querySelector(`#ip-camera-list li[data-ip="${cam.ip}"]`);
  if (li) li.classList.add('active');

  state.activeIpCamera = cam;
  log('info', `Connecting to IP camera: ${cam.ip}`);

  // Start streaming via native bridge
  stopIpCamera();
  try {
    AndroidBooth.startIPCameraStream(cam.ip, cam.port, cam.url, cam.type, 15, 'cam-' + cam.ip.replace(/\./g, '-'));
  } catch(e) {
    log('err', 'Stream error: ' + e.message);
  }

  // Switch to IP camera view
  if (state.currentSource !== 'ipcam') {
    switchSource('ipcam');
  } else {
    document.getElementById('no-cam').style.display = 'none';
    document.getElementById('ip-cam-feed').style.display = 'block';
  }
}

function stopIpCamera() {
  try { AndroidBooth.stopIPCameraStream(); } catch(e) {}
}

// ──────────────────────────────────────────────────
// mDNS device discovery
// ──────────────────────────────────────────────────
function discoverDevices() {
  if (!hasBridge()) return;

  const scanning = document.getElementById('scanning');
  scanning.style.display = 'inline-block';

  const types = [
    '_ipp._tcp', '_printer._tcp', '_http._tcp',
    '_wled._tcp', '_hap._tcp', '_googlecast._tcp',
  ];

  types.forEach(type => {
    try { AndroidBooth.startDiscovery(type, type); } catch(e) {}
  });

  setTimeout(() => {
    try { AndroidBooth.stopDiscovery(); } catch(e) {}
    scanning.style.display = 'none';
  }, 10000);
}

function addDevice(name, type, host, port, isMdns = true) {
  const container = document.getElementById('device-section');
  const list = container.querySelector('ul') || (() => {
    const ul = document.createElement('ul');
    ul.className = 'device-list';
    container.innerHTML = '';
    container.appendChild(ul);
    return ul;
  })();

  const existing = list.querySelectorAll('li');
  for (const li of existing) {
    if (li.dataset.host === host && li.dataset.port === String(port)) return;
  }

  const li = document.createElement('li');
  li.dataset.host = host;
  li.dataset.port = port;
  li.dataset.type = type;

  let icon = '📡', category = 'other';
  if (type.includes('ipp') || type.includes('printer')) {
    icon = '🖨️'; category = 'printer';
    state.devices.printers.push({ name, host, port });
    document.getElementById('print-section').style.display = 'block';
  } else if (type.includes('wled') || type.includes('hap') || name.toLowerCase().includes('wled') || name.toLowerCase().includes('light') || name.toLowerCase().includes('hue')) {
    icon = '💡'; category = 'light';
    state.devices.lights.push({ name, host, port });
    document.getElementById('lights-section').style.display = 'block';
  } else {
    state.devices.others.push({ name, host, port });
  }

  li.innerHTML = `
    <span class="dot"></span>
    <span>${icon}</span>
    <span style="flex:1">${name}</span>
    <span class="type">${category}</span>
    <span style="font-size:.65rem;color:var(--muted)">${host}</span>
  `;

  list.appendChild(li);
  log('info', `Found: ${name} (${category}) @ ${host}:${port}`);
}

// ──────────────────────────────────────────────────
// Light controls
// ──────────────────────────────────────────────────
function setLight(swatch) {
  if (!hasBridge()) { log('err', 'Bridge not available'); return; }
  const r = parseInt(swatch.dataset.r);
  const g = parseInt(swatch.dataset.g);
  const b = parseInt(swatch.dataset.b);

  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');

  state.devices.lights.forEach(light => {
    try { AndroidBooth.wledSetColor(light.host, light.port, r, g, b, 'color-' + light.host); } catch(e) {}
  });
  log('ok', `Set lights to rgb(${r},${g},${b})`);
}

function strobe() {
  if (!hasBridge()) return;
  let on = true;
  const interval = setInterval(() => {
    state.devices.lights.forEach(light => {
      try {
        if (on) AndroidBooth.wledSetColor(light.host, light.port, 255, 255, 255, '');
        else AndroidBooth.wledSetBrightness(light.host, light.port, 0, '');
      } catch(e) {}
    });
    on = !on;
  }, 200);
  setTimeout(() => clearInterval(interval), 3000);
  log('ok', 'Strobe activated');
}

function rainbow() {
  if (!hasBridge()) return;
  const colors = [[255,0,0],[255,127,0],[255,255,0],[0,255,0],[0,0,255],[75,0,130],[148,0,211]];
  let i = 0;
  const interval = setInterval(() => {
    const [r,g,b] = colors[i % colors.length];
    state.devices.lights.forEach(light => {
      try { AndroidBooth.wledSetColor(light.host, light.port, r, g, b, ''); } catch(e) {}
    });
    i++;
  }, 300);
  setTimeout(() => clearInterval(interval), 4000);
  log('ok', 'Rainbow mode');
}

function printPhoto() {
  if (!hasBridge()) { log('err', 'Bridge not available'); return; }
  if (!state.lastPhoto) { log('err', 'No photo to print'); return; }
  if (state.devices.printers.length === 0) { log('err', 'No printer found'); return; }

  document.getElementById('print-status').textContent = '⏳ Printing...';
  const printer = state.devices.printers[0];
  const imgData = state.lastPhoto.split(',')[1];
  try {
    AndroidBooth.printRaw(printer.host, printer.port, imgData, 'print-photo');
  } catch(e) {
    log('err', 'Print error: ' + e.message);
    document.getElementById('print-status').textContent = '❌ Error';
  }
}

// ──────────────────────────────────────────────────
// Photo Booth: Gallery
// ──────────────────────────────────────────────────
const gallery = [];
let modalIndex = -1;

function addToGallery(dataUrl, type) {
  gallery.unshift({ dataUrl, type: type || 'photo' });
  if (gallery.length > 50) gallery.pop();
  renderGalleryStrip();
}

function renderGalleryStrip() {
  const strip = document.getElementById('gallery-strip');
  strip.innerHTML = '';
  gallery.forEach((item, i) => {
    const el = item.type === 'photo'
      ? Object.assign(document.createElement('img'), { className: 'gallery-thumb', src: item.dataUrl })
      : Object.assign(document.createElement('video'), { className: 'gallery-thumb video-thumb', src: item.dataUrl, muted: true });
    el.onclick = () => openGalleryModal(i);
    strip.appendChild(el);
  });
  strip.classList.remove('hidden');
  document.getElementById('gallery-count').textContent = `(${gallery.length})`;
}

function openGalleryModal(index) {
  modalIndex = index;
  const item = gallery[index];
  const modal = document.getElementById('gallery-modal');
  const img = document.getElementById('modal-img');
  const video = document.getElementById('modal-video');
  img.style.display = 'none';
  video.style.display = 'none';
  if (item.type === 'photo') {
    img.src = item.dataUrl;
    img.style.display = 'block';
  } else {
    video.src = item.dataUrl;
    video.style.display = 'block';
  }
  modal.classList.add('show');
}

function closeGalleryModal() {
  document.getElementById('gallery-modal').classList.remove('show');
  document.getElementById('modal-video').pause();
}

function downloadModalItem() {
  if (modalIndex < 0) return;
  const item = gallery[modalIndex];
  const a = document.createElement('a');
  a.href = item.dataUrl;
  a.download = `booth-${Date.now()}.${item.type === 'photo' ? 'jpg' : 'webm'}`;
  a.click();
}

function deleteModalItem() {
  if (modalIndex < 0) return;
  gallery.splice(modalIndex, 1);
  closeGalleryModal();
  renderGalleryStrip();
}

function clearGallery() {
  gallery.length = 0;
  document.getElementById('gallery-strip').classList.add('hidden');
  document.getElementById('gallery-count').textContent = '';
  closeGalleryModal();
}

// ──────────────────────────────────────────────────
// Photo Booth: Countdown + Capture
// ──────────────────────────────────────────────────
let countdownActive = false;

function countdownAndCapture() {
  if (countdownActive) return;
  countdownActive = true;
  const overlay = document.getElementById('countdown-overlay');
  const num = document.getElementById('countdown-num');
  let count = 3;
  overlay.classList.add('show');
  const tick = () => {
    if (count > 0) {
      num.textContent = count;
      num.style.animation = 'none';
      void num.offsetWidth;
      num.style.animation = 'countPulse .8s ease-out';
      count--;
      setTimeout(tick, 800);
    } else {
      overlay.classList.remove('show');
      countdownActive = false;
      capturePhoto();
    }
  };
  tick();
}

// ──────────────────────────────────────────────────
// Photo Booth: Burst Mode
// ──────────────────────────────────────────────────
let burstActive = false;

function burstMode() {
  if (burstActive) return;
  burstActive = true;
  const badge = document.getElementById('burst-badge');
  const count = 5;
  let taken = 0;
  badge.textContent = `🔥 Burst 0/${count}`;
  badge.classList.add('show');
  const snap = () => {
    if (taken >= count || !burstActive) {
      badge.classList.remove('show');
      burstActive = false;
      return;
    }
    capturePhoto();
    taken++;
    badge.textContent = `🔥 Burst ${taken}/${count}`;
    setTimeout(snap, 400);
  };
  snap();
}

// ──────────────────────────────────────────────────
// Video Booth: Recording
// ──────────────────────────────────────────────────
let mediaRecorder = null;
let recordedChunks = [];
let recordingTimer = null;
let recordingStart = 0;

function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  let recStream = state.stream;

  // For IP camera mode, we need to record from the img element via canvas
  if (state.currentSource === 'ipcam' || !recStream) {
    // Capture stream from the active video/img element
    const srcEl = state.currentSource === 'ipcam'
      ? document.getElementById('ip-cam-feed')
      : document.getElementById('video');
    if (!srcEl || !srcEl.src) { log('err', 'No video source to record'); return; }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 640; canvas.height = 480;

    recStream = canvas.captureStream(15);
    const frameInterval = setInterval(() => {
      if (mediaRecorder && mediaRecorder.state !== 'recording') {
        clearInterval(frameInterval);
        return;
      }
      ctx.drawImage(srcEl, 0, 0, 640, 480);
    }, 66);
  }

  if (!recStream) { log('err', 'No stream to record'); return; }

  recordedChunks = [];
  try {
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : 'video/webm';
    mediaRecorder = new MediaRecorder(recStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      state.lastVideo = { blob, url };
      showVideoPreview(url);
      log('ok', `Video recorded: ${(blob.size / 1024 / 1024).toFixed(1)} MB`);
      document.getElementById('rec-indicator').classList.remove('show');
      document.getElementById('rec-btn').classList.remove('recording');
    };

    mediaRecorder.start(100); // collect data every 100ms
    recordingStart = Date.now();

    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-indicator').classList.add('show');
    document.querySelector('[onclick="toggleRecording()"] ~ span').textContent = 'Recording... tap to stop';

    recordingTimer = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recordingStart) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('rec-time').textContent = `${m}:${s}`;
    }, 500);

    log('ok', 'Recording started');
  } catch (e) {
    log('err', 'Recording error: ' + e.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    clearInterval(recordingTimer);
    document.querySelector('[onclick="toggleRecording()"] ~ span').textContent = 'Tap to start recording';
    log('ok', 'Recording stopped');
  }
}

function showVideoPreview(url) {
  const preview = document.getElementById('video-preview');
  const video = document.getElementById('recorded-video');
  video.src = url;
  preview.style.display = 'block';
}

function downloadVideo() {
  if (state.lastVideo) {
    const a = document.createElement('a');
    a.href = state.lastVideo.url;
    a.download = `booth-video-${Date.now()}.webm`;
    a.click();
  }
}

function clearVideo() {
  document.getElementById('video-preview').style.display = 'none';
  document.getElementById('recorded-video').src = '';
  state.lastVideo = null;
}

// ──────────────────────────────────────────────────
// Override capturePhoto to add to gallery
// ──────────────────────────────────────────────────
const _origCapture = capturePhoto;
capturePhoto = function() {
  if (state.currentSource === 'ipcam' && state.activeIpCamera) {
    const img = document.getElementById('ip-cam-feed');
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth || 640;
    canvas.height = img.naturalHeight || 480;
    const ctx = canvas.getContext('2d');
    const filter = currentFilter !== 'normal' ? currentFilter : null;
    if (filter) ctx.filter = getFilterCSS(filter);
    ctx.drawImage(img, 0, 0);
    state.lastPhoto = canvas.toDataURL('image/jpeg', 0.85);
  } else {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    const ctx = canvas.getContext('2d');
    if (state.mirror) ctx.translate(canvas.width, 0), ctx.scale(-1, 1);
    const filter = currentFilter !== 'normal' ? currentFilter : null;
    if (filter) ctx.filter = getFilterCSS(filter);
    ctx.drawImage(video, 0, 0);
    state.lastPhoto = canvas.toDataURL('image/jpeg', 0.85);
  }

  addToGallery(state.lastPhoto, 'photo');
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);
  log('ok', 'Photo captured');
}

function getFilterCSS(name) {
  switch(name) {
    case 'grayscale': return 'grayscale(1)';
    case 'sepia': return 'sepia(0.8)';
    case 'vintage': return 'sepia(0.5) contrast(1.2) brightness(0.9)';
    case 'cool': return 'hue-rotate(180deg) saturate(0.6)';
    default: return 'none';
  }
}

// ──────────────────────────────────────────────────
// ──────────────────────────────────────────────────
// TV Remote D-pad Focus Manager
// ──────────────────────────────────────────────────
// This manages focus navigation manually because Android TV WebView
// does NOT reliably handle D-pad navigation between elements.

let tvFocusables = [];
let tvFocusIndex = -1;

function getTVFocusables() {
  // Collect ALL clickable elements in visual order
  const SELECTOR = [
    '.source-tab',
    '.btn',
    '.btn-sm',
    '.filter-chip',
    '.color-swatch',
    '.gallery-thumb',
    '#rec-btn',
    '#device-list li',
    '#modal-dl-btn',
    '.modal-actions .btn'
  ].join(', ');

  const panel = document.getElementById('panel');
  if (!panel) return [];

  const els = [];
  // Query all buttons within panel first (the sidebar)
  panel.querySelectorAll('button, .filter-chip, .color-swatch, .gallery-thumb, [tabindex]').forEach(el => {
    // Skip hidden elements
    if (el.offsetParent === null && !el.closest('#gallery-strip')) return;
    if (el.closest('#filter-bar') && !document.getElementById('filter-bar').classList.contains('show')) return;
    els.push(el);
  });

  // Also include gallery strip items (at bottom of camera view)
  document.querySelectorAll('#gallery-strip .gallery-thumb').forEach(el => els.push(el));

  // Also include gallery modal buttons when visible
  if (document.getElementById('gallery-modal').classList.contains('show')) {
    document.querySelectorAll('#gallery-modal button, #gallery-modal .btn').forEach(el => els.push(el));
  }

  // Deduplicate
  return [...new Set(els)];
}

function refreshTVFocusables() {
  tvFocusables = getTVFocusables();
  // Remove tv-focused from any element no longer in the list
  document.querySelectorAll('.tv-focused').forEach(el => el.classList.remove('tv-focused'));
  // If current index is out of bounds, reset
  if (tvFocusIndex >= tvFocusables.length) tvFocusIndex = -1;
}

function applyTVFocus(index) {
  // Remove focus class from all
  document.querySelectorAll('.tv-focused').forEach(el => el.classList.remove('tv-focused'));

  if (index < 0 || index >= tvFocusables.length) return;

  const el = tvFocusables[index];
  if (!el) return;

  el.classList.add('tv-focused');
  el.focus({ preventScroll: true });

  // Scroll the element into view within the panel
  if (el.closest('#panel')) {
    const panel = document.getElementById('panel');
    const rect = el.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();
    if (rect.bottom > panelRect.bottom - 10) {
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  tvFocusIndex = index;
}

function focusNext(direction) {
  refreshTVFocusables();
  if (tvFocusables.length === 0) return;

  let newIndex;
  if (tvFocusIndex < 0) {
    // No focus yet, start at first or last depending on direction
    newIndex = direction > 0 ? 0 : tvFocusables.length - 1;
  } else {
    newIndex = tvFocusIndex + direction;
  }

  // Wrap around
  if (newIndex < 0) newIndex = tvFocusables.length - 1;
  if (newIndex >= tvFocusables.length) newIndex = 0;

  applyTVFocus(newIndex);
}

function focusTvFirstElement() {
  refreshTVFocusables();
  if (tvFocusables.length > 0) {
    applyTVFocus(0);
  }
}

function activateFocused() {
  if (tvFocusIndex < 0 || tvFocusIndex >= tvFocusables.length) return;
  const el = tvFocusables[tvFocusIndex];
  if (el) {
    el.click();
  }
}

// Global key handler for TV remotes
document.addEventListener('keydown', (e) => {
  const key = e.key;
  const handled = true;

  switch (key) {
    case 'ArrowUp':
    case 'ArrowDown':
    case 'ArrowLeft':
    case 'ArrowRight': {
      // Move in grid directions — treat Up/Down as -1/+1 index,
      // Left/Right also as index based direction
      const dir = (key === 'ArrowDown' || key === 'ArrowRight') ? 1 : -1;
      focusNext(dir);
      e.preventDefault();
      break;
    }
    case 'Enter':
    case ' ':
    case 'Select':
      activateFocused();
      e.preventDefault();
      break;
    default:
      return; // don't prevent default for other keys
  }
});

// Re-index on DOM changes (filter bar toggle, gallery modal, gallery strip updates)
const tvFocusObserver = new MutationObserver(() => {
  refreshTVFocusables();
});
tvFocusObserver.observe(document.body, {
  childList: true,
  subtree: true,
  attributes: true,
  attributeFilter: ['class', 'style']
});

// Also refresh when key elements change their display state
const _origToggleFilterBar = toggleFilterBar;
toggleFilterBar = function() {
  _origToggleFilterBar();
  setTimeout(refreshTVFocusables, 50);
};

const _origCloseGalleryModal = closeGalleryModal;
closeGalleryModal = function() {
  _origCloseGalleryModal();
  setTimeout(() => {
    refreshTVFocusables();
    focusTvFirstElement();
  }, 100);
};

// ──────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (hasBridge()) {
    initBridge();
  } else {
    log('info', 'Running in browser — native features disabled');
    document.getElementById('connection-status').textContent = 'Browser mode';
    document.getElementById('device-label').textContent = 'Web Preview';
  }

  startCamera();

  // Focus the first button for TV remote users
  setTimeout(focusTvFirstElement, 1500);
});
</script>

<!-- Gallery modal -->
<div id="gallery-modal">
  <button class="btn-close" onclick="closeGalleryModal()">✕</button>
  <img id="modal-img" style="display:none" />
  <video id="modal-video" style="display:none" controls></video>
  <div class="modal-actions">
    <button class="btn btn-primary btn-sm" id="modal-dl-btn" onclick="downloadModalItem()">⬇ Download</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="deleteModalItem()">🗑 Delete</button>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pembantu Booth</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --accent: #e94560;
    --text: #eee;
    --muted: #888;
    --success: #2ecc71;
    --warn: #f39c12;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden; height: 100vh; width: 100vw;
  }
  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 100vh;
    gap: 0;
  }
  /* ── Camera preview ── */
  #camera-col {
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #video { width: 100%; height: 100%; object-fit: contain; }
  #no-cam {
    color: var(--muted); font-size: 1.5rem;
    text-align: center; padding: 2rem;
  }
  #no-cam .icon { font-size: 4rem; margin-bottom: 1rem; }

  /* ── Side panel ── */
  #panel {
    background: var(--surface); overflow-y: auto;
    display: flex; flex-direction: column;
    border-left: 2px solid rgba(233,69,96,.3);
  }
  #panel header {
    padding: 1rem; background: rgba(0,0,0,.3);
    text-align: center; border-bottom: 1px solid rgba(255,255,255,.1);
  }
  #panel header h1 { font-size: 1.1rem; color: var(--accent); }
  #panel header .sub { font-size: .75rem; color: var(--muted); margin-top: .25rem; }

  .section {
    padding: .75rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .section h2 {
    font-size: .8rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: .5rem;
  }

  .device-list { list-style: none; }
  .device-list li {
    display: flex; align-items: center; gap: .5rem;
    padding: .4rem .5rem; margin-bottom: .25rem;
    background: rgba(255,255,255,.05); border-radius: 6px;
    font-size: .8rem; cursor: pointer;
    transition: background .2s;
  }
  .device-list li:hover { background: rgba(233,69,96,.15); }
  .device-list .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
  }
  .device-list .dot.offline { background: var(--muted); }
  .device-list .type {
    font-size: .6rem; background: rgba(255,255,255,.1);
    padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
  }

  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .5rem 1rem; border: none; border-radius: 6px;
    font-size: .8rem; font-weight: 600; cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-sm { padding: .3rem .6rem; font-size: .7rem; }

  .action-row { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem; }

  .color-grid {
    display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .4rem;
  }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: border-color .2s;
  }
  .color-swatch:hover { border-color: #fff; }
  .color-swatch.active { border-color: var(--accent); }

  #status-bar {
    margin-top: auto;
    padding: .5rem 1rem;
    font-size: .7rem; color: var(--muted);
    background: rgba(0,0,0,.2);
    display: flex; justify-content: space-between;
  }
  #status-bar .connected { color: var(--success); }

  .log {
    max-height: 100px; overflow-y: auto;
    font-size: .65rem; color: var(--muted);
    padding: .4rem 1rem;
    background: rgba(0,0,0,.2);
    font-family: monospace;
  }
  .log div { padding: 1px 0; }
  .log .info { color: #5bc0de; }
  .log .err { color: var(--accent); }
  .log .ok { color: var(--success); }

  /* ── Flash overlay ── */
  #flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #fff; opacity: 0; pointer-events: none;
    z-index: 999; transition: opacity .1s;
  }
  #flash.active { opacity: .7; }

  /* remote control via TV D-pad */
  :focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--muted); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="camera-col">
    <video id="video" autoplay playsinline muted></video>
    <div id="no-cam">
      <div class="icon">📷</div>
      <div id="cam-status">Waiting for camera...</div>
    </div>
    <div id="flash"></div>
  </div>

  <div id="panel">
    <header>
      <h1>✦ Pembantu Booth</h1>
      <div class="sub" id="device-label">Loading...</div>
    </header>

    <!-- Camera section -->
    <div class="section">
      <h2>📷 Camera</h2>
      <div class="action-row">
        <button class="btn btn-primary btn-sm" onclick="capturePhoto()">Capture</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="toggleMirror()">Flip</button>
      </div>
    </div>

    <!-- Devices -->
    <div class="section">
      <h2>📡 Devices <span id="scanning" style="display:none"><span class="spinner"></span></span></h2>
      <div id="device-section">
        <p style="font-size:.75rem;color:var(--muted)">Scanning WiFi for devices...</p>
      </div>
    </div>

    <!-- Lights -->
    <div class="section" id="lights-section" style="display:none">
      <h2>💡 Lights</h2>
      <div class="color-grid">
        <div class="color-swatch" style="background:#e94560" data-r="233" data-g="69" data-b="96" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#2ecc71" data-r="46" data-g="204" data-b="113" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#3498db" data-r="52" data-g="152" data-b="219" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#f1c40f" data-r="241" data-g="196" data-b="15" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#9b59b6" data-r="155" data-g="89" data-b="182" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#fff" data-r="255" data-g="255" data-b="255" onclick="setLight(this)"></div>
        <div class="color-swatch" style="background:#000" data-r="0" data-g="0" data-b="0" onclick="setLight(this)"></div>
      </div>
      <div class="action-row">
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="strobe()">Strobe</button>
        <button class="btn btn-sm" style="background:rgba(255,255,255,.1)" onclick="rainbow()">Rainbow</button>
      </div>
    </div>

    <!-- Print -->
    <div class="section" id="print-section" style="display:none">
      <h2>🖨️ Print</h2>
      <button class="btn btn-primary btn-sm" onclick="printPhoto()">Print Last Photo</button>
      <span id="print-status" style="font-size:.7rem;color:var(--muted);margin-left:.5rem"></span>
    </div>

    <div id="status-bar">
      <span id="connection-status">Disconnected</span>
      <span id="ip-display"></span>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────
const state = {
  stream: null,
  devices: { printers: [], lights: [], cameras: [], others: [] },
  lastPhoto: null,
  mirror: false,
  bridge: null,
  connected: false,
  localIP: 'Unknown',
};

// ──────────────────────────────────────────────────
// Native bridge detection
// ──────────────────────────────────────────────────
function hasBridge() {
  return typeof AndroidBooth !== 'undefined';
}

function initBridge() {
  if (!hasBridge()) {
    log('err', 'Native bridge not available (running outside app)');
    updateStatus('Browser mode — limited features');
    return;
  }
  state.bridge = AndroidBooth;
  state.connected = true;
  log('ok', 'Native bridge connected');

  // Get device info
  try {
    const info = JSON.parse(state.bridge.getDeviceInfo());
    state.localIP = info.localIP;
    document.getElementById('ip-display').textContent = info.localIP;
    document.getElementById('device-label').textContent = `${info.manufacturer} ${info.model}`;
  } catch(e) {}

  updateStatus('Connected ✓');
  document.getElementById('connection-status').classList.add('connected');
  document.getElementById('connection-status').textContent = 'Connected ✓';

  // Start device discovery
  discoverDevices();
}

// ──────────────────────────────────────────────────
// WebRTC Camera
// ──────────────────────────────────────────────────
async function startCamera() {
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
      audio: true,
    });
    const video = document.getElementById('video');
    video.srcObject = state.stream;
    await video.play();
    document.getElementById('no-cam').style.display = 'none';
    log('ok', 'Camera started');
  } catch (e) {
    document.getElementById('cam-status').textContent = 'Camera error: ' + e.message;
    log('err', 'Camera: ' + e.message);
  }
}

function capturePhoto() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  const ctx = canvas.getContext('2d');
  if (state.mirror) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);
  state.lastPhoto = canvas.toDataURL('image/jpeg', 0.85);

  // Flash effect
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);

  log('ok', 'Photo captured');
  return state.lastPhoto;
}

function toggleMirror() {
  state.mirror = !state.mirror;
  document.getElementById('video').style.transform = state.mirror ? 'scaleX(-1)' : 'none';
}

// ──────────────────────────────────────────────────
// Device discovery via native bridge
// ──────────────────────────────────────────────────
function discoverDevices() {
  if (!hasBridge()) return;

  const scanning = document.getElementById('scanning');
  scanning.style.display = 'inline-block';

  // Listen for bridge events
  window.addEventListener('onDeviceFound', (e) => {
    const d = e.detail;
    addDevice(d.name, d.type, d.host, d.port);
  });

  window.addEventListener('onDeviceLost', (e) => {
    // remove device
  });

  window.addEventListener('onDiscoveryStopped', () => {
    scanning.style.display = 'none';
  });

  window.addEventListener('onDiscoveryError', (e) => {
    scanning.style.display = 'none';
    log('err', 'Discovery: ' + e.detail);
  });

  window.addEventListener('onPingResult', (e) => {
    const r = e.detail;
    if (r.reachable) {
      addDevice(r.host, 'device', r.host, r.port, false);
    }
  });

  window.addEventListener('onHttpResponse', (e) => {
    const r = e.detail;
    log('info', `HTTP ${r.statusCode} ← ${r.url}`);
  });

  window.addEventListener('onHttpError', (e) => {
    const r = e.detail;
    log('err', `HTTP error: ${r.url} — ${r.error}`);
  });

  window.addEventListener('onPrintResult', (e) => {
    const r = e.detail;
    if (r.success) {
      log('ok', 'Print sent to ' + r.host);
      document.getElementById('print-status').textContent = '✅ Sent';
    } else {
      log('err', 'Print failed: ' + (r.error || ''));
      document.getElementById('print-status').textContent = '❌ Failed';
    }
  });

  // Start scanning common service types
  const types = [
    '_ipp._tcp',          // Printers
    '_printer._tcp',      // Printers
    '_http._tcp',         // Smart lights (WLED, etc.)
    '_wled._tcp',         // WLED lights
    '_hap._tcp',          // HomeKit accessories
    '_googlecast._tcp',   // Chromecast
  ];

  types.forEach(type => {
    try { AndroidBooth.startDiscovery(type, type); } catch(e) {}
  });

  // Stop scanning after 10 seconds
  setTimeout(() => {
    try { AndroidBooth.stopDiscovery(); } catch(e) {}
    scanning.style.display = 'none';
  }, 10000);
}

function addDevice(name, type, host, port, isMdns = true) {
  const container = document.getElementById('device-section');
  const list = container.querySelector('ul') || (() => {
    const ul = document.createElement('ul');
    ul.className = 'device-list';
    container.innerHTML = '';
    container.appendChild(ul);
    return ul;
  })();

  // Deduplicate
  const existing = list.querySelectorAll('li');
  for (const li of existing) {
    if (li.dataset.host === host && li.dataset.port === String(port)) return;
  }

  const li = document.createElement('li');
  li.dataset.host = host;
  li.dataset.port = port;
  li.dataset.type = type;

  // Categorize
  let icon = '📡', category = 'other';
  if (type.includes('ipp') || type.includes('printer')) {
    icon = '🖨️'; category = 'printer';
    state.devices.printers.push({ name, host, port });
    document.getElementById('print-section').style.display = 'block';
  } else if (type.includes('wled') || type.includes('hap') || name.toLowerCase().includes('wled') || name.toLowerCase().includes('light') || name.toLowerCase().includes('hue')) {
    icon = '💡'; category = 'light';
    state.devices.lights.push({ name, host, port });
    document.getElementById('lights-section').style.display = 'block';
    li.style.cursor = 'pointer';
    li.ondblclick = () => {
      // Ping to check
      try { AndroidBooth.pingDevice(host, port, 'ping-' + host); } catch(e) {}
    };
  } else if (type.includes('camera') || type.includes('rtsp')) {
    icon = '📷'; category = 'camera';
    state.devices.cameras.push({ name, host, port });
  }

  li.innerHTML = `
    <span class="dot"></span>
    <span>${icon}</span>
    <span style="flex:1">${name}</span>
    <span class="type">${category}</span>
    <span style="font-size:.65rem;color:var(--muted)">${host}</span>
  `;

  list.appendChild(li);
  log('info', `Found: ${name} (${category}) @ ${host}:${port}`);
}

// ──────────────────────────────────────────────────
// Light controls
// ──────────────────────────────────────────────────
function setLight(swatch) {
  if (!hasBridge()) { log('err', 'Bridge not available'); return; }
  const r = parseInt(swatch.dataset.r);
  const g = parseInt(swatch.dataset.g);
  const b = parseInt(swatch.dataset.b);

  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');

  state.devices.lights.forEach(light => {
    try {
      AndroidBooth.wledSetColor(light.host, light.port, r, g, b, 'color-' + light.host);
    } catch(e) { log('err', 'Light error: ' + e.message); }
  });
  log('ok', `Set lights to rgb(${r},${g},${b})`);
}

function strobe() {
  if (!hasBridge()) return;
  let on = true;
  const interval = setInterval(() => {
    state.devices.lights.forEach(light => {
      try {
        if (on) AndroidBooth.wledSetColor(light.host, light.port, 255, 255, 255, '');
        else AndroidBooth.wledSetBrightness(light.host, light.port, 0, '');
      } catch(e) {}
    });
    on = !on;
  }, 200);
  setTimeout(() => clearInterval(interval), 3000);
  log('ok', 'Strobe activated');
}

function rainbow() {
  if (!hasBridge()) return;
  const colors = [
    [255,0,0],[255,127,0],[255,255,0],[0,255,0],[0,0,255],[75,0,130],[148,0,211]
  ];
  let i = 0;
  const interval = setInterval(() => {
    const [r,g,b] = colors[i % colors.length];
    state.devices.lights.forEach(light => {
      try { AndroidBooth.wledSetColor(light.host, light.port, r, g, b, ''); } catch(e) {}
    });
    i++;
  }, 300);
  setTimeout(() => clearInterval(interval), 4000);
  log('ok', 'Rainbow mode');
}

// ──────────────────────────────────────────────────
// Printing
// ──────────────────────────────────────────────────
function printPhoto() {
  if (!hasBridge()) { log('err', 'Bridge not available'); return; }
  if (!state.lastPhoto) { log('err', 'No photo to print'); return; }
  if (state.devices.printers.length === 0) { log('err', 'No printer found'); return; }

  document.getElementById('print-status').textContent = '⏳ Printing...';

  // Send to first printer
  const printer = state.devices.printers[0];
  const imgData = state.lastPhoto.split(',')[1]; // strip mime prefix

  try {
    AndroidBooth.printRaw(printer.host, printer.port, imgData, 'print-photo');
  } catch(e) {
    log('err', 'Print error: ' + e.message);
    document.getElementById('print-status').textContent = '❌ Error';
  }
}

// ──────────────────────────────────────────────────
// Manual IP scan (for devices not found by mDNS)
// ──────────────────────────────────────────────────
function scanSubnet() {
  if (!hasBridge()) return;
  const parts = state.localIP.split('.');
  if (parts.length !== 4) return;
  const subnet = parts.slice(0, 3).join('.');
  log('info', `Scanning subnet ${subnet}.0/24...`);

  // Check common ports
  const commonPorts = {
    80: 'HTTP', 443: 'HTTPS', 515: 'LPD', 631: 'IPP', 9100: 'RAW',
    2137: 'WLED', 554: 'RTSP', 8080: 'HTTP-ALT',
  };

  for (let i = 1; i <= 10; i++) {  // first 10 hosts
    const host = `${subnet}.${i}`;
    Object.entries(commonPorts).forEach(([port, label]) => {
      try { AndroidBooth.pingDevice(host, parseInt(port), `ping-${host}-${port}`); } catch(e) {}
    });
  }
}

// ──────────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────────
function log(level, msg) {
  const div = document.getElementById('log');
  const line = document.createElement('div');
  line.className = level;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
  console.log(`[${level.toUpperCase()}]`, msg);
}

function updateStatus(msg) {
  document.getElementById('connection-status').textContent = msg;
}

// ──────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Detect bridge
  if (hasBridge()) {
    initBridge();
  } else {
    log('info', 'Running in browser — native features disabled');
    document.getElementById('connection-status').textContent = 'Browser mode';
    document.getElementById('device-label').textContent = 'Web Preview';
  }

  // Start camera
  startCamera();
});
</script>
</body>
</html>
